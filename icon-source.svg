<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="clock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ff4757"/>
    </linearGradient>
    <linearGradient id="inner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3436"/>
      <stop offset="100%" style="stop-color:#636e72"/>
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>
  
  <!-- 时钟外圈 -->
  <circle cx="512" cy="512" r="360" fill="url(#clock)" filter="url(#shadow)"/>
  
  <!-- 时钟内圈 -->
  <circle cx="512" cy="512" r="320" fill="url(#inner)"/>
  
  <!-- 刻度 -->
  <g stroke="#fff" stroke-width="8" stroke-linecap="round">
    <!-- 12点 -->
    <line x1="512" y1="192" x2="512" y2="240"/>
    <!-- 3点 -->
    <line x1="832" y1="512" x2="784" y2="512"/>
    <!-- 6点 -->
    <line x1="512" y1="832" x2="512" y2="784"/>
    <!-- 9点 -->
    <line x1="192" y1="512" x2="240" y2="512"/>
  </g>
  
  <!-- 时针 -->
  <line x1="512" y1="512" x2="512" y2="320" stroke="#ff6b6b" stroke-width="24" stroke-linecap="round"/>
  
  <!-- 分针 -->
  <line x1="512" y1="512" x2="672" y2="512" stroke="#fff" stroke-width="16" stroke-linecap="round"/>
  
  <!-- 中心点 -->
  <circle cx="512" cy="512" r="20" fill="#ff6b6b"/>
  
  <!-- 高光 -->
  <circle cx="400" cy="380" r="40" fill="#fff" opacity="0.1"/>
</svg>
